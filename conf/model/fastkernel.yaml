name: fastkernel

target:
  _target_: src.models.FastKernel
  itr_num: 1000
  min_delta: 0.001
  early_patience: 10 # default: 10, set to 50 for better performance
  grid_factor: 1
  dt_grid_factor: 30
  alpha_lr: 0.008
  use_dt_loss: True
  kernel_grid: True
  model: pe
  pe_type: RFF
  pe_dim: 256
  pe_sigma: 0.01
  log_sigma: 10
  voxel_size: [0.2, 0.2, 6]
  point_cloud_range: [-204.8, -204.8, -3, 204.8, 204.8, 3] # [-51.2, -51.2, -3, 51.2, 51.2, 3]
  
val_monitor: val/EPE_Three
is_trainable: False